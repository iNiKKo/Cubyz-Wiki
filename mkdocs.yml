site_name: Cubyz Wiki
use_directory_urls: false
repo_url: https://github.com/iNiKKo/Cubyz-Wiki
repo_name: iNiKKo/Cubyz-Wiki
edit_uri: edit/main/docs/

theme:
  name: material
  logo: images/logo.png
  favicon: images/logo.png
  features:
    - navigation.path
    - toc.integrate
    - navigation.tracking
    - navigation.prune
    - navigation.indexes
    - content.action.edit

plugins:
  - offline

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.blocks.caption
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - css/infobox.css
